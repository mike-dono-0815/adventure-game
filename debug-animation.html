<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Animation Debug</title>
  <style>
    body { margin: 0; background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 0; }
    canvas { background: #2a3a4a url('assets/backgrounds/Stakeholder.png') center/cover no-repeat; cursor: crosshair; display: block; }
    #controls { display: flex; gap: 8px; margin-bottom: 6px; }
    .char-btn { background: #37475A; color: #ccc; border: 1px solid #37475A; border-radius: 4px; padding: 6px 16px; font: 13px "Segoe UI", Arial, sans-serif; cursor: pointer; }
    .char-btn.active { background: #FF9900; color: #131A22; border-color: #FF9900; font-weight: 600; }
    #info { color: #aaa; font: 13px monospace; margin-top: 6px; letter-spacing: 0.04em; }
  </style>
</head>
<body>

<div id="controls"></div>
<canvas id="c" width="1344" height="768"></canvas>
<div id="info">click to move</div>

<script>
  var canvas = document.getElementById('c');
  var ctx    = canvas.getContext('2d');
  var info   = document.getElementById('info');

  // --- Character configs ---
  // frames: { right: [[row,col], ...], left: [[row,col], ...] }
  var CHAR_DEFS = {
    player: {
      label:    'Player',
      src:      'assets/characters/Player.jpg',
      cols: 4, rows: 2,
      removeBg: true,
      frames: {
        right: [[0, 0], [0, 1]],
        left:  [[1, 2], [1, 3]]
      }
    },
    stakeholder: {
      label:    'Stakeholder',
      src:      'assets/characters/Stakeholder.png',
      cols: 4, rows: 2,
      removeBg: true,
      frames: {
        right: [[1, 0], [0, 2]],
        left:  [[1, 3], [0, 1]]
      }
    }
  };

  var activeChar = 'player';
  var sprites    = {};   // key → processed Image
  var loaded     = {};   // key → bool

  // --- Image processing ---
  function erodeAlpha(data, width, height) {
    var alpha = new Uint8Array(width * height);
    for (var i = 0; i < width * height; i++) alpha[i] = data[i * 4 + 3];
    for (var y = 0; y < height; y++) {
      for (var x = 0; x < width; x++) {
        if (alpha[y * width + x] === 0) continue;
        var erode = false;
        for (var dy = -1; dy <= 1 && !erode; dy++) {
          for (var dx = -1; dx <= 1 && !erode; dx++) {
            if (dx === 0 && dy === 0) continue;
            var nx = x + dx, ny = y + dy;
            if (nx < 0 || nx >= width || ny < 0 || ny >= height) continue;
            if (alpha[ny * width + nx] === 0) erode = true;
          }
        }
        if (erode) data[(y * width + x) * 4 + 3] = 0;
      }
    }
  }

  function removeWhiteBackground(img, callback) {
    var offscreen = document.createElement('canvas');
    offscreen.width  = img.naturalWidth;
    offscreen.height = img.naturalHeight;
    var octx = offscreen.getContext('2d');
    octx.drawImage(img, 0, 0);
    var imageData = octx.getImageData(0, 0, offscreen.width, offscreen.height);
    var data = imageData.data;
    for (var i = 0; i < data.length; i += 4) {
      if (data[i] >= 240 && data[i+1] >= 240 && data[i+2] >= 240) data[i+3] = 0;
    }
    erodeAlpha(data, offscreen.width, offscreen.height);
    octx.putImageData(imageData, 0, 0);
    var result = new Image();
    result.onload = function () { callback(result); };
    result.src = offscreen.toDataURL('image/png');
  }

  function loadCharacter(key) {
    var def = CHAR_DEFS[key];
    var img = new Image();
    img.onerror = function () { console.error('Failed to load:', def.src); };
    img.onload  = function () {
      if (def.removeBg) {
        removeWhiteBackground(img, function (processed) {
          sprites[key] = processed;
          loaded[key]  = true;
        });
      } else {
        sprites[key] = img;
        loaded[key]  = true;
      }
    };
    img.src = def.src;
  }

  Object.keys(CHAR_DEFS).forEach(loadCharacter);

  // --- Character picker buttons ---
  var controlsEl = document.getElementById('controls');
  Object.keys(CHAR_DEFS).forEach(function (key) {
    var btn = document.createElement('button');
    btn.className = 'char-btn' + (key === activeChar ? ' active' : '');
    btn.textContent = CHAR_DEFS[key].label;
    btn.addEventListener('click', function () {
      activeChar = key;
      player.animFrame = 0;
      player.animTimer = 0;
      document.querySelectorAll('.char-btn').forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
    });
    controlsEl.appendChild(btn);
  });

  // --- Player state ---
  var PH    = 320;
  var SPEED = 400;

  var player = {
    x: canvas.width  / 2,
    y: canvas.height / 2,
    tx: null, ty: null,
    walking:   false,
    direction: 'right',
    animFrame: 0,
    animTimer: 0
  };

  // --- Click to walk ---
  canvas.addEventListener('click', function (e) {
    var rect   = canvas.getBoundingClientRect();
    var scaleX = canvas.width  / rect.width;
    var scaleY = canvas.height / rect.height;
    player.tx  = (e.clientX - rect.left) * scaleX;
    player.ty  = (e.clientY - rect.top)  * scaleY;
    player.walking = true;
  });

  // --- Loop ---
  var last = null;

  function loop(ts) {
    requestAnimationFrame(loop);
    if (!last) last = ts;
    var dt = Math.min((ts - last) / 1000, 0.1);
    last = ts;
    update(dt);
    render();
  }

  function update(dt) {
    if (!player.walking) {
      player.animFrame = 0;
      player.animTimer = 0;
      return;
    }

    var dx   = player.tx - player.x;
    var dy   = player.ty - player.y;
    var dist = Math.sqrt(dx * dx + dy * dy);

    if (Math.abs(dx) > Math.abs(dy)) {
      player.direction = dx > 0 ? 'right' : 'left';
    }

    if (dist <= SPEED * dt) {
      player.x = player.tx;
      player.y = player.ty;
      player.walking = false;
    } else {
      player.x += (dx / dist) * SPEED * dt;
      player.y += (dy / dist) * SPEED * dt;
    }

    player.animTimer += dt;
    if (player.animTimer >= 0.15) {
      player.animTimer = 0;
      var def = CHAR_DEFS[activeChar];
      var frameCount = def.frames[player.direction].length;
      player.animFrame = (player.animFrame + 1) % frameCount;
    }
  }

  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Grid
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth   = 1;
    for (var gx = 0; gx < canvas.width;  gx += 80) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, canvas.height); ctx.stroke(); }
    for (var gy = 0; gy < canvas.height; gy += 80) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(canvas.width, gy); ctx.stroke(); }

    // Target marker
    if (player.walking && player.tx !== null) {
      ctx.strokeStyle = 'rgba(255,153,0,0.6)';
      ctx.lineWidth   = 1.5;
      var r = 10;
      ctx.beginPath(); ctx.moveTo(player.tx - r, player.ty); ctx.lineTo(player.tx + r, player.ty); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(player.tx, player.ty - r); ctx.lineTo(player.tx, player.ty + r); ctx.stroke();
    }

    // Character
    var def    = CHAR_DEFS[activeChar];
    var sprite = sprites[activeChar];
    var isLoaded = loaded[activeChar];

    var frameW = isLoaded ? sprite.naturalWidth  / def.cols : 0;
    var frameH = isLoaded ? sprite.naturalHeight / def.rows : 0;
    var PW     = Math.round(PH * (frameW / frameH)) || Math.round(PH * 0.9);

    var drawX = Math.round(player.x - PW / 2);
    var drawY = Math.round(player.y - PH);

    if (isLoaded) {
      var crop   = 4;
      var frames = def.frames[player.direction];
      var f      = frames[player.animFrame % frames.length];
      var row = f[0], col = f[1];
      ctx.drawImage(sprite,
        col * frameW + crop, row * frameH + crop, frameW - crop * 2, frameH - crop * 2,
        drawX, drawY, PW, PH);
    } else {
      ctx.fillStyle = '#FF9900';
      ctx.fillRect(drawX, drawY, PW, PH);
    }

    // HUD
    info.textContent =
      'char ' + def.label + '  ' +
      (isLoaded ? 'sprite OK ' + sprite.naturalWidth + 'x' + sprite.naturalHeight : 'loading...') + '  ' +
      'pos (' + Math.round(player.x) + ', ' + Math.round(player.y) + ')  ' +
      'dir ' + player.direction + '  frame ' + player.animFrame + '  ' +
      (player.walking ? 'walking' : 'idle');
  }

  requestAnimationFrame(loop);
</script>
</body>
</html>
